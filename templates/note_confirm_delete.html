{% extends 'base.html' %}

{% block content %}
    <div class="container">
        <h2>Видалення нотатки</h2>
        <p>Ви впевнені, що хочите видалити нотатку "{{ note.title }}"?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Так, видалити</button>
            <a href="{% url 'note_detail' object.id %}" class="btn btn-info">Скасувати</a>
        </form>
    </div>
{% endblock %}
