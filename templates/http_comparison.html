<!DOCTYPE html>
<html>
<head>
    <title>Порівняння HTTP клієнтів</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        .btn { padding: 10px 20px; background: #007cba; color: white; border: none; cursor: pointer; margin: 5px; }
        .btn:hover { background: #005a85; }
        .results { margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 5px; }
        select { padding: 8px; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Порівняння HTTP клієнтів</h1>

        <form id="comparisonForm" method="post">
            {% csrf_token %}
            <select name="client_type" id="clientType">
                <option value="requests">Requests (синхронно)</option>
                <option value="httpx_sync">HTTPX (синхронно)</option>
                <option value="httpx_async">HTTPX (асинхронно)</option>
                <option value="aiohttp">Aiohttp (асинхронно)</option>
                <option value="requests_threading">Requests + Threading</option>
            </select>
            <br>
            <button type="submit" class="btn">Тестувати</button>
        </form>

        <div id="results" class="results" style="display: none;">
            <h3>Результати:</h3>
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        document.getElementById('comparisonForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.querySelector('.btn');
            btn.disabled = true;
            btn.textContent = 'Тестується...';

            const formData = new FormData(this);

            try {
                const response = await fetch(window.location.href, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                document.getElementById('results').style.display = 'block';
                document.getElementById('resultsContent').innerHTML = `
                    <p><strong>Клієнт:</strong> ${data.client_type}</p>
                    <p><strong>Час виконання:</strong> ${data.execution_time} секунд</p>
                    <p><strong>Успішних запитів:</strong> ${data.results_count}</p>
                `;
            } catch (error) {
                alert('Помилка: ' + error.message);
            }

            btn.disabled = false;
            btn.textContent = 'Тестувати';
        });
    </script>
</body>
</html>
