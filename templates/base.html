<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Нотатки{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .container {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }
        .note-details {
            margin: 1.5rem 0;
        }
        .actions {
            margin-top: 1rem;
        }
        .btn {
            margin-right: 0.5rem;
        }
        form {
            max-width: 600px;
            margin-top: 1rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .messages {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    {# Навігаційне меню #}
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Нотатки</a>
            <button class="navbar-toggle" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'note_create' %}">Додати нотатку</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

{# Повідомлення #}
{% if messages %}
    <div class="container">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
{% endif %}

<main>
    {% block content %}
    {% endblock %}
</main>

{# Footer #}
<footer class="footer mt-auto py-3 bg-light">
    <div class="container text-center">
        <span class="text-muted">(c) {% now "Y" %} Нотатки. Всі права захищено.</span>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
{% block extra_js %}
{% endblock %}
</body>
</html>
